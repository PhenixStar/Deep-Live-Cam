name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Frontend typecheck + build
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # Create placeholder sidecar binary so cargo check passes
      - name: Create sidecar placeholder
        run: |
          mkdir -p app/src-tauri/binaries
          touch "app/src-tauri/binaries/deep-live-cam-server-x86_64-unknown-linux-gnu"
          chmod +x "app/src-tauri/binaries/deep-live-cam-server-x86_64-unknown-linux-gnu"

      - name: Rust check
        working-directory: app/src-tauri
        run: cargo check

      - name: Python syntax check
        run: |
          python3 -m py_compile core/server.py
          python3 -m py_compile core/modules/camera_utils.py
