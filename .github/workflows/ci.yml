name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Frontend typecheck + build
        working-directory: app
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # Create placeholder sidecar binary so cargo check passes
      - name: Create sidecar placeholder
        run: |
          mkdir -p app/src-tauri/binaries
          touch "app/src-tauri/binaries/deep-forge-server-x86_64-unknown-linux-gnu"
          chmod +x "app/src-tauri/binaries/deep-forge-server-x86_64-unknown-linux-gnu"

      - name: Tauri Rust check
        working-directory: app/src-tauri
        run: cargo check

      - name: Python syntax check
        run: |
          python3 -m py_compile core/server.py
          python3 -m py_compile core/modules/camera_utils.py

  rust-engine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Cargo clippy
        working-directory: core/rust-engine
        run: cargo clippy -- -D warnings 2>&1 || cargo clippy

      - name: Cargo test
        working-directory: core/rust-engine
        run: cargo test
