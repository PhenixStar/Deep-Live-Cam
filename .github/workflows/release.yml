name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,appimage
            rust-sidecar: scripts/build-rust-sidecar.sh
          - os: macos-14
            bundles: dmg
            rust-sidecar: scripts/build-rust-sidecar.sh
          - os: windows-latest
            bundles: msi,nsis
            rust-sidecar: scripts/build-rust-sidecar-win.ps1

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Verify updater pubkey is set
        shell: bash
        run: |
          if grep -q "UPDATER_PUBKEY_PLACEHOLDER" app/src-tauri/tauri.conf.json; then
            echo "::error::Updater pubkey placeholder not replaced."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      # Linux system deps
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      # Build the Rust sidecar binary (replaces Python sidecar in v0.2+)
      - name: Build Rust sidecar (Unix)
        if: runner.os != 'Windows'
        run: bash ${{ matrix.rust-sidecar }}

      - name: Build Rust sidecar (Windows)
        if: runner.os == 'Windows'
        run: pwsh ${{ matrix.rust-sidecar }}

      # Install frontend deps and build Tauri app
      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "Deep Forge ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles ${{ matrix.bundles }}
